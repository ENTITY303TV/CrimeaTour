<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style_catalog.css">
  <title>Document</title>
</head>

<body class="body">

  <div class="page_ropes_bg">
    <div class="rope rope_1"></div>
    <div class="rope rope_2"></div>
    <div class="rope rope_3"></div>
    <div class="rope rope_4"></div>
    <div class="rope rope_5"></div>
    <div class="rope rope_6"></div>
    <div class="rope rope_7"></div>
    <div class="rope rope_8"></div>
  </div>

  <header class="header">
    <div class="header_container">
      <div class="header_left">
        <div class="header_logo">
          <a href="index.html"><img src="../../img/logo.svg" alt="Логотип"></a>
        </div>
        <div class="header_about btn-main">
          <a href="about.html"><img src="../../img/about.svg" alt="О нас"></a>
        </div>
      </div>

      <div class="header_right">
        <div class="header_favorite btn-main">
          <a href=""><img src="../../img/Favorit.svg" alt="Избранное"></a>
        </div>
        <div class="header_log btn-main">
          <a href="">Войти</a>
        </div>
      </div>
    </div>
  </header>

  <form class="search">
    <div class="search_container">
      <div class="search_field search_name">
        <input type="text" placeholder="поиск по названию" name="search_query" required>
      </div>
      <div class="search_field search_date">
        <span class="search_prefix">с</span>
        <input type="text" placeholder="дата" name="date_start" inputmode="decimal">
        <span class="search_prefix">до</span>
        <input type="text" placeholder="дата" name="date_end" inputmode="decimal">
      </div>
      <div class="search_field search_people">
        <input type="text" placeholder="кол.чел." name="people_count" inputmode="numeric">
      </div>
    </div>
    <button type="submit" class="search_btn btn-main" aria-label="Найти">
      <img src="../../img/lupa.svg" alt="Лупа">
    </button>
  </form>

  <main class="main_board">
    <div class="inner_board">

<div class="listings-container">
    
    <div class="listing-card">
        <div class="listing-info">
            
            <div class="listing-header">
                <div class="listing-title">Название отеля</div>
                <button class="favorite-btn">🤍</button>
            </div>

            <div class="listing-desc">
                Здесь будет большое и красивое описание этого потрясающего места, которое затянет туриста с первых строк...
            </div>

            <div class="listing-footer">
                <div class="listing-attributes">
                    <span class="chip">Wi-Fi</span>
                    <span class="chip">Бассейн</span>
                    <span class="rating">⭐ 4.8</span>
                </div>
                <div class="listing-price">10 321 000 за ночь</div>
            </div>

        </div>

        <div class="listing-image">
            <img src="img/hotel1.jpg" alt="Отель">
        </div>
    </div>

    <div class="pagination">
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">4</button>
        <button class="page-btn">...</button>
    </div>

</div>


    </div>
  </main>

  <footer class="main_footer">
    <div class="footer_top_bar">
      <div class="footer_header_pill col_1">О нас</div>
      <div class="footer_header_pill col_2">Мы в реестре туроператоров</div>
      <div class="footer_header_pill col_3">связь</div>
    </div>

    <div class="footer_content_grid">
      <div class="footer_column">
        <a href="about.HTML" class="footer_link_pill btn-main">партнерам</a>
        <a href="about.HTML" class="footer_link_pill btn-main">Вакансии</a>
        <a href="#" class="footer_link_pill btn-main">Отчет</a>
      </div>

      <div class="footer_column">
        <div class="footer_info_pill rto_pill">РТО 88005553535</div>
      </div>

      <div class="footer_column">
        <a href="#" class="footer_link_pill social_pill btn-main">
          <img src="img/ODNOK.svg" alt="Одноклассники" class="social_icon_img icon_ok">
        </a>
        <a href="#" class="footer_link_pill social_pill btn-main">
          <img src="img/MAX.svg" alt="ВКонтакте" class="social_icon_img icon_vk">
        </a>
        <a href="#" class="footer_link_pill social_pill btn-main">
          <img src="img/VK.svg" alt="МАКС" class="social_icon_img icon_MAX">
        </a>
      </div>
    </div>
  </footer>

  <script src="JS/script.js"></script>
</body>

</html>
